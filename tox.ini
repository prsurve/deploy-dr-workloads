[tox]
envlist = py311,flake8
skipsdist = True

[testenv]
deps =
    -r requirements.txt
    pyyaml
commands =
    python -m py_compile deploy_workloads.py

[testenv:flake8]
deps =
    flake8
commands =
    flake8 deploy_workloads.py --max-line-length=120 --ignore=E501,W503

[flake8]
max-line-length = 120
ignore = E501,W503
exclude = .git,__pycache__,.tox,.eggs,*.egg,build,dist
